name: soundwave
description: A Spotify-like music streaming and download app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  provider: ^6.1.1
  
  # Audio playback
  just_audio: ^0.9.36
  just_audio_background: ^0.0.1-beta.11
  audio_session: ^0.1.18
  
  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # Storage & Database
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  
  # Network
  dio: ^5.4.1
  connectivity_plus: ^5.0.2
  
  # Permissions
  permission_handler: ^11.3.0
  
  # File management
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
